services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: video-resizer-backend
    init: true
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      HOST: "0.0.0.0"
      PUBLIC_BASE_URL: "http://localhost:3001"
      FFMPEG_USE_NVIDIA: "true"
      FFMPEG_CPU_PRESET: "superfast"
      FFMPEG_NVENC_PRESET: "p2"
      FFMPEG_VIDEO_QUALITY: "23"
      FFMPEG_THREADS: "0"
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,video,utility"
    gpus: all
    volumes:
      - ./backend/data:/app/backend/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: video-resizer-frontend
    init: true
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      backend:
        condition: service_healthy
